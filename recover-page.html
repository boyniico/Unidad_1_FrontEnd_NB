<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover | SportClub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-recover">
    <header id="main-header" class="p-30px width-100percent bg-gradient-135deg-dim-purple-ocean-blue">
        <a href="#">
            <img id="header-logo" src="images/logo.png" alt="SportClub Logo" />
        </a>
    </header>

    <main>
        <form>
            <h1>Recover your password</h1>
            <div class="label-input">
                <label for="email">Enter your email so we can send you a <span id="purple-colorated-text">recovery code...</span></label>
                <input type="email" id="email" name="email" spellcheck="false" autocomplete="off" placeholder="your@email.com">
            </div>

            <input type="checkbox" id="check-sent" class="hide">

            <label for="check-sent" class="btn-primary btn-false">Send code</label>

            <div class="message-sent">
                Code successfully sent!
            </div>
        </form>
    </main>

    <footer class="p-30px width-100percent bg-gradient-135deg-dim-purple-ocean-blue">
        <p>Made by Nicolás Bustamante, 2026</p>
    </footer>
</body>
</html>
