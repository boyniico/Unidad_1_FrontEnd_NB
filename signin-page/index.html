<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <header id="main-header" class="header p-30px width-100percent bg-gradient-135deg-dim-purple-ocean-blue">
        <img id="header-logo" src="images/logo.png" alt="SportClub Logo"/>
    </header>
    <main>
        <section id="form-section" class="p-30px">
            <div class="label-input">
                <label for="input-name">Name:</label>
                <input type="text" id="input-name" name="name" placeholder="Enter your name">
            </div>
            <div class="label-input">
                <label for="input-last-name">Last name:</label>
                <input type="text" id="input-last-name" name="last-name" placeholder="Enter your last name">
            </div>
            <div class="label-input">
                <label for="input-email">Email:</label>
                <input type="email" id="input-email" name="email" spellcheck="false" autocomplete="off" placeholder="Enter your email">
            </div>
            <div class="label-input">
                <label for="input-password">Password:</label>
                <input type="password" id="input-password" name="password" placeholder="Enter your password">
            </div>
        </section>
    </main>
    <footer class="p-30px width-100percent bg-gradient-135deg-dim-purple-ocean-blue">

    </footer>
</body>
</html>
